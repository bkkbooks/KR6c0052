body:
  text: 癸未坐制於白雲菴再考詳定見有此注方可傳焉錢唐釋曇應述決群疑而起行益品彚以無私陶育聖凡範圍空有寧越金剛般若哉無著因定得偈天親受頌成文非兜率慈尊孰開荒至教但斯經也詞源渺浩義海沖深僧佉阿僧佉此云無著重著論以抗行吳興復撰疏而贊述對經考論已盡幽玄尋疏證經未為全當科判雖準繩有在解釋則義理乖違於是不得已管窺天台義意摸論大塗校彼伸明是非別矣仍取天親補助及今古優長故曰采微蓋采摘他歷切衆妙直注于經庶閲者易解耳時紹興壬子仲春二十有三日寓思溪蘭若敘金剛般若波羅蜜經釋經為二初釋題二釋文釋題者懸覽一經大義以釋首題大義者五重玄義所謂名體宗用教相也初釋名則喻法為名金剛是喻般若等是法金剛者無著論釋有二意一約金剛寶二約畫金剛形且約金剛寶者此寶出天竺國梵語跋折羅亦名斫迦羅此云金剛謂金中精堅者也剛生金中百鍊不銷可以切玉取以堅利能斷壞萬物如般若能斷萬惑故以為喻吾祖云般若如金剛隨所擬皆碎無著云能斷者般若波羅蜜中聞思修所斷如金剛斷處而斷若爾如大品等諸般若莫不皆有能斷之力何獨此經以金剛為喻答良以此會之前大品等席佛悉令衆生住是般若故使佛種性不斷而護念付囑且聞者必疑般若乃果佛所住之法衆生垢重當云何住是折伏散亂衆雖伏疑未由開決空生至此為衆斷疑故述昔興歎問降住事佛為釋疑故答則令住是般若者如金剛能斷煩惱故論云下去論云無著論也此小金剛波羅蜜以如是名顯勢力以如是金剛之名顯般若勢力故知絓是般若皆有是力此既諸般若之釋疑經是故金剛二字文雖出此義實通為諸般若之作譬由是持説者福重功深二約畫形者如論云又如畫金剛形初後闊中則狹如是般若波羅蜜中狹者謂淨心地初後闊者謂信行地如來地此顯示不共義也釋曰則力士金剛之杵有摧物之功可譬此經地位是以一十六住總名信行地第十八上求佛地名如來地上求佛地中復有六種具足於第六心具足中又有六義如是則初後闊中間唯第十七入證道一住處名淨心地所謂狹也故如金剛形而特言畫者以此間無此寶但傳畫像故云耳此意既擬地位則別在茲經論所謂顯示不共義者則顯初意與諸般若共也般若者或有翻名智慧或無翻以生善故孤山謂不云智慧者良以般若天言智慧人語天言尊重人語輕薄意存生善由來不翻今言般若必具三種謂方便般若觀照般若實相般若則總題以冠別文故文文之下皆具三種可以意知疏云準大論有二種般若謂世間般若出世間般若世間者但於俗諦而求滿智出世間者即於布施持戒等心無染著乃至攝心散心不可得故當知三藏多修世間般若如劬嬪大臣分地息諍即其事也摩訶衍門正修出世間般若以觀布施等因緣即空性相叵得故又衍門中有共不共般若復通部教約部則方等般若名共由共二乘故華嚴名不共此經不入二乘人手故若約教則別在第四時由般若部通三教通教則三乘同學名共教別圓則二乘不聞名不共教荊溪云故此二共俱共二乘即部教二共也此經正當約教非約部義問約教則方等具有四教亦應受共不共名何故別在第四時耶答荊溪云以方等經多順彈訶共義稍踈問共不共二種般若為一座同聞為異席説若一座別圓亦共二乘若異席般若通被三教答諸部般若通被三教則二乘同座雖聞別圓聞而不解無受潤因狀當聾啞故釋籤云諸部般若以但不但二種中道不共之法共二乘説若爾但是共説不與共證波羅蜜此翻到彼岸又云度無極或云事究竟經者通名也梵語修多羅義翻為經蓋經由聖人心口故稱經無翻亦名經蓋此方聖人所説六籍稱經以此代彼法王所説亦稱經也天台解經凡約三種謂教行理經云書寫讀誦者即教經也信解受持者即行經也諸佛菩薩從此經出者即理經也雖約三種首題稱經唯能詮教經行理即教下所詮也天台云外國種修多羅聖教之都名荊溪云一代教法皆名為經此釋名竟若餘四章則實相為體一經所詮故檀波羅蜜為宗檀義攝六一經所修之要故破人法二執為用文文蕩相故摩訶衍為教相熟酥味故若就首題則總三般若為名觀照乃當其宗實相方便體用可知所謂釋名總此三法體宗用分對三法三一總別斯之謂歟二釋文今依無著一十八住科判經文其餘細目盡從論解此外或補以疏家亦隨宜裁酌有理存焉問無著菩薩入日光三昧上升兜率親於慈氏尊處受八十頌何意復造論作一十八住釋經答八十頌但直頌經文未有科判則行位次第其旨未明由是別造論伸通問八十頌分二十七斷疑生起血脈宛順何無階次答分文科判意出天親無著但得其頌問二論可會同不答不須以經意多含各取義釋此經三分分文從如是至敷座而坐是序分從長老須菩提在大衆中去是正宗分若如疏家以此文分屬別序者別序乃表發正宗若非所表序義不成今以此文屬正宗者從座而起雖未彰言事必屬正離座由請法故三從須菩提若有人去是流通分論謂不染行住即弘通無染也且序有通別之異通序則三世道同以今佛一期大小衆經悉安如是等語故別序則教門機別而經經由藉悉異故且通序者佛臨涅槃阿難以四事請問佛令一切經初悉安如是我聞等覩此等語信是佛説故曰證信序或云經前序如來付囑一切經前令安是語故或云經後序結集時方安故或云破邪序對破外道阿歐故此經前具有六事則離佛及處也就此分六初所傳之理如是肇師謂如是者信順之辭信則所聞之理會順則師資之道成大論云如是義者即是信若人心中有信清淨是人能入佛法若無信是人不能入佛法不信者言是事不如是信者言是事如是無信者譬如牛皮未柔不可屈折有信者譬如牛皮已柔隨用可作復次經中説信為手如人有手入寶山中自在取寶有信亦如是入佛法寶山中自在所取無信如無手人入寶山中非但不能取寶以無手故動轉反為寶之所傷無信亦如是入佛法寶山非但無所得以無信故謗法墮苦是則以有如是信故乃有所聞吾祖謂如是者乃一部所聞法體也二能傳之人我聞肇師云明出經者親承聖旨無傳聞之謬然阿難當結集時見愛已除二我都盡今稱我者以傳法故隨順世間假名稱我也聞者大論謂耳根不壞聲在可聞處作意欲聞則根塵意和合故有聞也大論云隨俗説我和合稱聞然阿難結集時登高座已大迦葉執尼師壇禮敬殷勤如佛無異大衆覩此各懷疑情且迦葉既為四衆而作依止非佛不爾今禮敬如此莫釋尊重出耶或疑莫他方佛來耶或疑高座阿難莫阿難成佛耶故知三疑競起由迦葉禮敬而生一稱我聞知是結集敬法故禮則三疑頓息自舊或云權疑為啓當來誠信故若爾只應疑阿難作佛何須此二疑耶或謂實疑以阿難登座形容似佛衆不識故疑若爾只應疑釋尊重出與他方佛來何須疑阿難成佛耶然則今説權實如何須知既由迦葉禮敬事反常情衆遂生疑乃實疑也三會理之時一時合云某年月日由彼土三際此方四時歲令不同不可翻譯但以説經始末總云一時則四衆感教得益之時也四稟承之主佛大論云佛陀此云知者知何等法謂三世衆生數非衆生數常無常等一切諸法菩提樹下了了覺知故名佛也然只樹下一佛隨四教之機所見則四佛色相不同今是衍經且論三佛五所聞之地在舍衛國在者住也舍衛正云室利羅筏悉底訛言舍衛亦舍婆提新翻豐德謂國豐四事一財物二欲塵三多聞四解脫舊翻聞物十二遊行經云無物不有天下聞之故曰聞物大論云佛知恩故多住王舍城及舍婆提以報生身地恩故住舍婆提以報法身地恩故住王舍城法身於生身勝故二城中多住王舍城問經説生迦毗羅國何故論云生舍婆提耶答西域記云迦毗與舍衛相鄰同是中印土境故此言之問迦毗羅國是佛生處何故不多住耶答大論云佛初還國迦葉兄弟千比丘本修婆羅門法苦行山間形容憔悴父王見之以此諸比丘不足光飾世尊即選諸釋貴人子弟兼又壯戶遣一人強令出家有善心樂道有不樂者此諸釋比丘不應在本生處何以故既未離欲若近親屬必染著心生為護此輩故不多住迦毗羅國祇樹給孤獨園祇樹者梵語祇桓亦名祇陀正言逝多此翻戰勝波斯匿王太子也法鏡經目為勝氏樹焉給孤獨梵語須達多此云給孤獨亦名善施以此長者仁慈常給濟孤獨善能行施故國人以此稱之南山靈感傳云祇桓寺基址東西僅十里南北七里餘七十步初須達詣太子買園太子言能以金布地令間無空便當相與須達曰諾隨其價太子言戲語耳須達言不應妄語即共與訟時首陀會天化作人與評言太子法不應妄語價既已決不宜中悔太子遂與之便使人象負金出園須臾欲滿餘殘少地須達思惟何藏金不多不少當補滿足祇桓問言嫌貴買之答不也自思何藏者可足當補滿之祇桓念言佛必大德能使斯人輕寶乃爾齊此且止勿更出金園地屬卿樹木屬我我自上佛乃至起立精舍為佛作屋以妙栴檀用為香泥別房住止千二百處凡百二十處別犍巨寒切稚音地此方擊鍾板也施設已竟請佛而住佛告阿難今此園地須達所置林樹花果祇桓所有二人同心共立精舍應當號祇樹給孤獨園先君後臣禮也六聞持之伴與大比丘衆千二百五十人俱與者共也大者歎德也大論謂摩訶衍翻大多勝大者天王大人所敬故多者通四韋陀及三藏典故勝者勝九十五種外道故譯者從一且云大耳比丘者或有翻言除饉衆生在因無法自資得報多饉乏出家戒行是良福田能生物善除因果之饉或無翻名今三義謂乞士破惡怖魔不仰不下不方不維離此四食次第行乞清淨活命故名乞士戒禁七支禪鎖心猿怖無常狼除煩惱脂是名破惡修此法故天魔惱毒慮其出境復恐度人是故愁怖雖有三義破惡為本衆者準諸經皆有衆字四人已上和合為衆千二百五十人俱者三迦葉兄弟共一千人舍利弗目犍連共二百五十人師徒歸佛俱為弟子大論問此諸比丘何故常隨世尊答如病者得差常隨大醫如衆星拱月顯佛德尊諸經同聞故此偏舉二別序爾時世尊食時著衣持鉢入舍衛大城乞食此序發起一經也世尊者十號具足為世所尊食時者午前也毗羅三昧經佛為法慧菩薩説四食時早起諸天食日中三世佛食日西畜生食日暮鬼神食著衣者著僧伽梨持鉢者持四天王所奉鉢入城者園在城外五六里既欲乞食故須入城是則佛自行乞有六益故一為盲者得見故二為女人為父母障礙者得見故三令病者得見故四作軌範故五除慢凡所見無輕慢故六示天王鉢故寶雲經謂得食分為四分一擬與同梵行人二擬施貧病乞人三施水陸衆生四自食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐次第乞者善見論云過去諸佛皆次第乞食無有選擇收衣鉢等者洗足理須收衣洗足者如云洗手曰盥洗頭曰沐洗身曰浴洗足曰洗音銑然何故先食後洗足當知乞食還恐過時所以且食食訖方洗足如僧祇律云午時日影過一髮一瞬即非時敷座而坐者論云世尊何故以寂靜者威儀而坐顯示唯寂靜者於法能覺能説以福智具故能覺能説但教不徒興顯示趺坐以待問者然何故斯經以乞食為興致須知次第行乞表不住相食訖示坐表居寂理又乞食為齋齋齊也齊心物境以表正宗六度萬行心境均齊有約三學表對者何經不詮此太通漫二正宗依論有七義句今準前三句分文為三一種性不斷二發起行相三行所住處初又二初敬相時長老須菩提在大衆中長老阿含中佛言諸比丘從今稱長者為大德少者稱長老長老之稱未必年老故大論引偈云所謂長老相不必以年耆形瘦鬢髮白空老內無德斥非能捨罪福果精進行梵行已離一切法是名為長老顯是蓋美其德業耳縱是年耆內若無德亦號年少如四分律云阿難頭白而迦葉號為年少今所稱者乃德長年老二具美矣須菩提此翻空生亦曰善現善吉以生時家中倉庫篋器皆空占者謂之所現之相既善且吉從此立名然倉庫一空何名吉耶當知生時暫空隨即如故是則雖空須用即足以表後解第一義空雖空而具足諸法即從座起偏袒右肩袒有二若此方有袒蓋以謝罪如左傳楚子圍鄭剋之鄭伯肉袒牽羊即其事也若彼方有袒蓋以禮儀弟子事師或至師所必袒右覆左恐師有指示執作便易故右膝著地文殊問經云右是正道左是邪道用正去邪白虎通曰天左旋日月五星右行故隨順世間以右膝著地若論所表膝表於行地表於理以行契理故膝著地合掌恭敬合掌如世斂手則表敬也肇師云請法之相二白佛又二初興歎而白佛言希有世尊應知此會之前已聞諸般若故伏疑在懷未由開決覩此示坐寂靜必知欲垂法於無窮為顯其當得此般若佛種不斷義故上座須菩提經初興歎希有世尊二述事述爾前見聞事如來善護念諸菩薩善付囑諸菩薩善護念者若已熟菩薩佛即護念以善巧力防護憶念恐失善利善付囑者若未熟菩薩佛則付託囑纍已熟菩薩於未來世中以般若而成熟之是故如來護念付囑使佛種性永永不斷菩薩者天竺梵音摩訶菩提質諦薩埵今略其餘但云菩薩此翻大道心成衆生亦云開士亦云大勇心等二發起行相空生從座而起先敬讚已後方請問禮也於此為三初空生發起世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心阿耨多羅此云無上三藐三此云正等菩提此云覺則無上正等覺心發是心者方行般若向雖伏疑令方啓問一經行相由茲而生論云何故須菩提問也有六因緣一為斷疑故二為起信解故三為入甚深義故四為不退轉故五為生喜故六為正法久住故此經正為斷疑若有疑者得斷故為未熟菩薩聞多福德於般若起信解故為已熟菩薩入甚深義故已得不輕賤者令精勤心不復退轉故已得淨心者令歡喜故能令未來世大乘教久住故以是因緣空生問也云何應住者謂欲願故降伏其心者謂折伏散亂故於中欲者正求也願者為所求故作心思念也折伏散亂者若彼三摩鉢帝心散制令還住也問諸譯於云何住後復有云何修行一句此譯何無答般若深法果佛所住菩薩欲願住此發起弘誓既知發心必須起行住中義具故此略之二如來印許佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心善哉者論云以善問故於上座須菩提所應稱善哉則三乘行異唯問菩薩上合佛心其問則善大論云須菩提好行無諍定常慈悲衆生雖不能廣度衆生而常助菩薩以菩薩事問佛再言善哉者善之至也汝今諦聽等者欲酬所請誠令諦聽應如是住般若如是降伏其心此當為汝宣説三善現願聞唯然世尊願樂欲聞唯然者禮對也謝公云慈戒許説敬肅傾心三行所住處自此分文為一十八住先且通示大綱其次逐段帖釋初通示大綱又二初列章二判位初列章者初發心二修行三欲得色身住處四欲得法身住處五修道得勝中無慢六為不離佛出時七願淨佛土八成熟衆生九遠離隨順外論散亂十觀破名色十一供養如來十二遠離懈怠十三明忍辱十四與法相應十五於證道時遠離喜動十六為求教授十七為證道十八上求佛道論中又一時總作八住處故論云略為八種亦得滿足一攝住處二波羅蜜淨住處三欲得住處四離障礙住處五淨心住處六究竟住處七廣大住處八甚深住處且攝住處即發心淨住處即修行此二因也欲得即色身法身果也此總示因果若離障礙則該十二住別明行相是因也淨心究竟即證道佛道此果也餘二則橫遍一經顯般若廣大甚深也故知以八住處總攝十八者欲顯示總別兩番因果之義耳二判位此十八住生起次第隨文辨示此不預陳避繁文故若判地位者然十八住住即是地乃所依義何以復約地位判釋當知十八住行位階次通受住名所以別約三種地判釋者以前十六住未破無明總判其位名信行地第十七破無明入證道名淨心地第十八上求佛地即如來地是則經意總略論作三種地判義該別圓不必更以餘途對位也然第十五證道時遠離喜動與第十七證道住處同異若何答疏謂此經兼含兩教一往觀文似唯別位以通指地前為信行故若作圓位初住證道猶名信行者如起信明初發心住名信成就發心今謂不然與論有違一者論自云證道時遠離喜動所以將入證道恐起喜動心生自取見則障於道故須遠離是則由離喜動方入證道未可便作圓證道説二者以八住處從第五修道得勝中無慢至第十六為求教授總此十二為八中離障礙住處攝第十七證道即八中淨心住處是則由離障故心淨入證道也若未入證猶是似道故名信行地以是故知第十五顯是別圓內凡之位與第十七證道乃真似不同行位次第義甚明白何固昧耶問般若滿字應通三教論何判位但在別圓答荊溪云故至般若唯須此二明不共者説部意也意雖不共猶有方等新受小者至此須通亦有衍門旁得小者是故兼用故知論約部意明位唯在別圓若約法收機則義通三教以位驗教如下文四果即其事也二釋文分為一十八段初發心為二初舉人佛告須菩提諸菩薩摩訶薩應如是降伏其心疏云略舉降伏必兼於住以其破定須觀理故下文明修行後結云但應如所教住此亦舉住必兼降伏以其觀理即能破惑故論中住與降伏皆同時釋之是故經文影略互舉耳二示相如偈云廣大第一常其心不顛倒利益深心住此乘功德滿準此分文為四初廣大心以心遍法界故廣大也所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想一切衆生總舉也胎卵濕化等別相也論釋謂受生依止境界所攝差別然約三類共攝一切衆生初受生則隨業受生即四生也義雖通上一往且指四趣四洲及六欲二依止雖通下界且以色無色定為依止則四禪為有色空處為無色三境界者青龍謂舉境顯心以心想難知故舉境界以顯於想瑜伽論即云依心差別建立有想等三種有情謂識處為有想無所有處為無想有頂為䨥非二第一心我皆令入無餘涅槃而滅度之我指發心之者上胎卵等一切衆生並入弘誓願數皆以無餘涅槃第一勝法而滅度之此蓋菩薩之本任此中對治不發心不度衆生是邪行者也三常心如是滅度無量無數無邊衆生實無衆生得滅度者如是滅度牒前第一心無量無數無邊衆生牒前廣大心實無衆生得滅度者此明菩薩一體大悲觀取衆生猶如己身衆生得度如自身得度豈見有可度者故云實無四不顛倒心何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩若菩薩於一切衆生所起他想轉非自體謂有可度者則存能所之共有我人分別之見即非菩薩為欲審是所以斥非我人等相者論云於中取自體相續為我相展轉取餘趣非為人相我所取為衆生相我乃至壽住取為命相釋曰取自體內識陰為我相取餘趣非人為人相計我所四陰續前識陰五陰和合為衆生相計後壽命為壽者相二修行且前發心自可以酬其問既知發心必須行行以行填願所以更示行相經云復次也問此下十七住望初發心悉屬行相何獨科此謂修行耶答一經所修六度之行此中明布施則具攝六度通示一經行相故云修行疏謂檀義為宗雅合論意今從之矣分文為三初明布施二顯福德三勸依教初又二初明行相二示離過初又二初不住未來果復次須菩提菩薩於法應無所住行於布施菩薩住是相應三昧及攝散心時於波羅蜜法行布施則了三事體空一物二施者三受者無非般若圓常之性何所住著故云應無所住行於布施則三論皆約三種施釋且偈云檀義攝於六資生無畏法是中一二三是名修行住此是攝法偈所謂一以資生攝布施一故二以無畏攝持戒忍辱二故三以法施攝精進禪定智慧三故故云一二三也一資生施者以等心而施不有愛憎如是則能資長大福報故云資生施二無畏施者以持戒故除慳惜心隨其所乞悉能施與利益衆生無所怯畏以忍辱故自除瞋恚行於慈愍心無穢濁一切能捨如下仙人即其事也三法施者若無精進於受法人所為説法時疲倦故不能説法若無禪定則貪於信敬供養及不能忍寒熱逼惱故染心説法若無智慧便顛倒説法多有過故不離此三得成法施問圓論六度互收則度度六度此何唯布施攝六答六度互收蓋就理論布施攝六此從事説是則就事明施顯示所修不住於相故如論云彼諸波羅蜜有二種果謂未來現在未來果者檀那得大福報尸羅得自身具足謂釋梵等羼提得大伴助大眷屬毗離耶得果報等不斷絶禪那得生身不可損壞般若得諸根猛利及諸悅樂於大人衆中得自在等若諸菩薩求未來果故行施為住事行施如花酬果則局心住相是故經言於法應無所住行於布施二不住現在果所謂不住色布施不住聲香味觸法布施論云若求現在果信敬供養故行施為住色聲香味觸行施若求現法涅槃故行施為住法行施故經云不住色聲香味觸法布施論云不住行施者即此不住為安立第一義故二示離過須菩提菩薩應如是布施不住於相論云此為顯示謂相應三昧及攝散心於此現未二時不住相想則不住有相亦不住無相以安住第一義故不墮有無中二顯示福德又二初福不可量何以故若菩薩不住相布施其福德不可思量論云如是建立不住已或有菩薩貪福德故於此不堪為令堪故世尊顯示不住行施福德甚多不可思量二比齊太虗須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量論云猶如虗空有三因緣一遍一切處謂於住不住相中福生故二寬廣高大殊勝故三無盡究竟不窮故以此比齊般若福性遍法界故如太虗空遍一切也高勝三乘偏狹者故如虗空高大殊勝也能趣佛果菩提故如虗空無盡究竟也三勸依教須菩提菩薩但應如所教住三欲得色身住處為三初問須菩提於意云何可以身相見如來不此以世諦為問由上二章是佛自説以發心修行是因因必尅果將謂如來由修是因至果得此身相為防彼謂成就此色身相見故所以試問二答不也世尊不可以身相得見如來何以故如來所説身相即非身相以第一義諦答如來色身應緣而有乃非究竟答云不也則不可以色身相得見如來而如來所説身相者即法身非相也此蓋指應即法吾今此身即是法身三述成佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來論云即顯安立第一義於中相成就為虗妄非相成就不虗妄相成就三十二相應相非真皆是虗妄非相成就若見諸相非相即見如來不虗妄也疏云染淨二法是有通別二惑屬虗妄既云凡所有相俱是虗妄何分異解此明應佛相豈用染淨二惑釋耶問色身住處何以指應即法相即非相若爾莫顯法身耶答應身法身一體相即但離偏計須知非謂即法除去應相單指法身謂之非相也四欲得法身住處為二初言説法身二證得法身初又二初問須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不由發心修行至果成就身相親聞於佛信解則易末世衆生神根淺薄誠恐聞之信解尤難託物致問故云頗有衆生等聞是章句者論云所説七種義句於不顛倒義想是謂實信應知如言執義彼非實信良以實信難得所以問也二答為五初顯示修行佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實莫作是説者遮所問也謂如來滅後有如是能生信者故也後五百歲者毗尼母論直列五百第一百年解脫堅固第二百年禪定堅固第三百年持戒堅固第四百年多聞堅固第五百年布施堅固大集有五箇五百第一至第四事同母論唯第五百云鬪諍堅固故知今文以大集為正如義淨譯本云於未來世正法滅時等正法滅時即後五百歲時寶積經云若於末世後五百歲正法滅時佛及法寶及持法者三不現前持法者即僧寶乃三寶隱沒之時有持戒修福者福是六度初門戒是定慧之本是則滅後有具持福者可以受道能生信心耳二顯示集因當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者植佛既多顯善根深植則集因勝也大品中須菩提問佛是深般若誰能信解佛言有菩薩先於諸佛所久修六度善根成熟供養無數百千萬億諸佛常與善知識相隨是人能信須菩提又問信般若者有何等相何等貌佛言欲恚癡斷離是信相貌且欲恚癡斷者折伏散亂也良由住是般若相應三昧時能折伏散亂住般若者名為生信乃至一念生淨信者信果上莊嚴身相皆由無所得心而得成就論云此顯示集因一心淨信尚得如是福德何況生實相也三顯示善友所攝須菩提如來悉知悉見是諸衆生天親云故知如來悉知便足何故復説悉見若不説悉見或謂如來以比智知恐生是心故若爾但説如來悉見何故復説悉知若不説悉知或謂如來以肉眼等見為防是心故須二語大論云言知言見事得牢固譬如繩二為一則堅牢也且知見何等論云知者知名身見者見色身謂一切行住所作中知其心見其依止與般若相應是故感此所攝四顯示福德相應得如是無量福德隨譯則云生如是無量福德取如是無量福德論云生者福正起時故取者即彼滅時攝持種子故須知生則集因以集因滅時攝持善體種子與緣因福德相應也今經但云得不説因以集因前已説故五顯示實想為三初實想離妄何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相論云顯示實想對治邪取想謂心想若心有法非法取則非實相想也疏云法與非法解者多途如智者釋法者善惡假實之法也非法者無善惡假實之法也故知有無之相即真俗二諦也今謂不然經明無法無非法蓋是捨著則捨有無二邊之著不應作二諦釋義況智者所釋自以有無二見釋法非法今具敘其文以闢其非仍從所解故止觀云法祇善惡兩心假實之法若見有善惡假名及見善惡實法蓋是著我人衆生壽者所言非法相者若善惡假名是無及見善惡實法是無皆是著我人衆生壽者何以故依無起見故全文故知大師約二見釋法非法明如於日何云二諦所言善惡者蓋約六度六蔽起心分之若見蔽度有善惡異者是執假名若見蔽度感善惡報者是執實法是故見是假名與實法名為法相若見為無則撥棄因果名非法相二覆釋勸捨何以故是諸衆生若心取相即為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法若心取相者覆釋成前以前文云是諸衆生無復我相等者由心住實想不取相故無反顯若心取相即為著我人等若取法相者成前無法相反顯若取法相即著我人等何以故者徵釋取法相既著我人等若取非法相亦即著我人等然何故復有我等取當知由無明未斷故論云然於我想中隨眠不斷故則為有我取等隨眠無明識也問此中則與即如何答雖皆語辭各有其義則者乃引上之辭蓋總遮其莫起心若其起心則為生著即者指法之辭蓋示其起心之過若也起心取法相及非法相即同有無二計故云即著即者是也是故不應取法等者住般若者應離分別故云不應此勸捨著心也三引喻結顯以是義故如來常説汝等比丘知我説法如筏喻者法尚應捨何況非法如來常説者指昔阿含筏喻經彼經云佛言我説筏喻尚捨是法何況非法今文借彼喻意結顯如來説法無取此中法即假實之法非法即無假實之法是以教談因果若起定執此執成見尚應捨之況撥無因果理不應故豈不捨耶故云法尚應捨何況非法論云顯示菩薩欲得言説法身不應作不實想法非法即不實想也疏云此文語勢與前不殊釋義不可一例前以俗諦為法真諦為非法此中應以四聖所修為法六凡所修為非法此不然也蓋釋前法非法謬至此文不能消通遂作異途釋義使文旨不貫二證得法身然雖法身本有欲證必由福智莊嚴今從能嚴文為二初智相法身二福相法身初又二初問須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶此問空生若答如是者世尊應有所得隨自取見若云不也如來灼然得菩提果説法度人特設斯問意在空生若為領解佛所證得二答有三初不執應相説證須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説説云無有定法者上座須菩提道佛意故世諦故有菩提及得是為欲願攝持以方便故二俱為有若如世尊意説者二俱無有為顯此故經言如我解世尊所説義等故知空生解佛所説義故以第一義法身體答不約世諦應身以應身隨緣無有定實故偈云應化非真佛亦非説法者二正顯法身無取何以故如來所説法皆不可取不可説非法非非法論云由説法故知得菩提故於説法中安立第一義於中不可取謂聽者正聞時不可説者謂説者演説時以依真如義故無取無説非法謂分別性亡故非非法者彼真如法無我相有故是則説法既爾得菩提準知所以經云皆者兼具之詞也三賢聖同證無為所以者何一切賢聖皆以無為法而有差別論云以無為故得名聖人無為者無分別義也若爾何有差別當知無為若虗空飛鳥有高下故論釋有二種無為初無為者世諦約修則三摩鉢帝相應及折伏散亂時則義該真似是菩薩有學得名第二無為者唯第一義究竟絶修無上覺故是如來無學得名故云以無為法而有差別也自此已後一切住處中皆顯以無為故得名聖人應知前諸住處中未説無為得名二福相法身文為二初較量福德二顯示所以初又二初舉施寶福多二顯持經福勝初又二初問須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不論云三千大千七寶布施等云何顯示即彼所有言説法身出生如來福相至得法身良由般若導達事理合行能生福相法身者也三千大千者俱舍頌云四大洲日月蘇迷盧欲天梵世各一千名一小千界一四洲同一日月一蘇迷盧乃至一六欲天一初禪天名一世界如是千世界同為二禪天所覆名小千界此小千千倍説名一中千復次一千小千名一中千其間總有十億初禪一千二禪同為三禪所覆此千倍大千復次一千中千名為大千其間總有萬億初禪十億二禪一千三禪同為四禪所覆皆同一成壞四輪所成三災所壞火至初禪水至二禪風至三禪七寶者金銀琉璃頗梨硨璖瑪瑙赤真珠云云二答須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多疏云是福德者事福也即非福德性者事福本空也是故如來説福德多者雖空而假也此説不然若云事本空者且空無四性不應曰非也今謂是福德者如來二嚴中福德相也即非福德性者論云此遮增益邊以無彼福聚分別自性故顯示般若蕩相空無福聚自性也是故如來説福德多者論云此遮損減邊彼不如言辭有自性而有可説事以如來説福德多雖無言辭以世諦故如來説福德多則離二邊增減之失顯住中道故論云以此福聚攝取福相法身由藉般若導達乃攝取如來福相法身則顯此經福勝故下較量斯之謂也二顯持經福勝若復有人於此經中受持乃至四句偈等為他人説其福勝彼論云乃至説一四句偈生福甚多況復如來所有福相至得法身論云其福者此為説相顯示福相法身故勝彼者顯示欲願攝持故又云對治福不生故對治事福不能出生福相法身也偈云福不趣菩提二能趣菩提事福暫報天樂福謝元是苦因不趣菩提自行受持為人演説此二乃般若了因能趣菩提也四句偈者增一集云隨舉經中要偈如四諦之流疏云但詮合實相印者至於極少首題一句受持與説得福皆勝且舉四句為況耳實相印者如智者云此大小印印半滿經外道不能雜天魔不能破如世文符得印可信身子云世尊説實道波旬無此事大論云諸小乘經若有無常無我涅槃三印印之知是佛説修之得道無三法印即是魔説大乘但有一法印謂諸法實相名了義經能得大道無實相印斯乃魔説然大小乘談印蓋約部類以分大小聲聞經是小諸大乘經是大大乘部中雖有通別兩教以通別無別部帙乃取部主勝説唯就圓談一印云云問阿難佛臨涅槃在娑羅林外為六萬四千億魔所惱諸魔自變形為如來乃至能説初地之法十二部經三十七品唯不能説圓頓法門以圓頓非其境界故是則既説別教已還法門莫須詮印何云外道不能雜天魔不能破答魔雖説十二部經而內無所證所説無詮聞者豈能得道故妙立云魔雖不證別異空假而能説別異空假魔不證故顛倒而説但有其言言中無旨若爾阿難何以不識如荊溪云阿難無定力故為魔入骨故雖覺知是魔欲起欲語都不從意二顯示所以為二初顯經尊極何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出論云以何因緣於言説法身中如是説一四句偈能生多福為成就此義故經言諸佛及菩提法從此出生故當知般若是名佛母大品云佛從般若中學得一切種智及相好身二約理亡相須菩提所謂佛法者即非佛法論云世諦故言佛出生以有菩提故即此二並故名為佛法以菩提及佛故第一義諦即非佛法第五修道得勝中無慢論云如前略説八種住處已下十二總名離障礙住處對治故知自下十二悉有惑障可離對治此中為離慢也修道得勝即修般若道得四勝果也無慢則不見有所得也問前文已明一切賢聖此中復約四果者何答前文為明賢聖同證無為故此中無為法中得無所得故問經中四果前三果名果第四果名道者何答前三果就所翻名下約斷證分齊中顯示無所得義便故華梵對説耳第四果無翻以所得道顯示無為無得對前三説不云果耳問空生何以修般若大行答非修大行此中説者空生既解空空與般若相應感佛加被對揚斯事此乃顯示菩薩修道得勝果離慢也文具四果故今分文為四且初初果為二初問須菩提於意云何須陀洹能作是念我得須陀洹果不論云我得須陀洹果此為依義顯示對治我得慢故若謂我得則為有我是慢者顯示無慢故此問也二答須菩提言不也世尊何以故須陀洹名為入流而無所入初果名流有逆有順一生死流須陀洹人即逆此流衆生順之二者道流須陀洹人順入此流即今文入流是也而無所入者以無為法中不見有所得也不入色聲香味觸法是名須陀洹不入色香等者不入則不順知色即空故於塵境逆之即名逆流初果翻流二義具矣二二果又二初問須菩提於意云何斯陀含能作是念我得斯陀含果不二答須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含初果後進斷欲思六品盡潤六生已名為二果更有三品共潤一生猶未斷故更須一番來生欲界方斷故翻一往來而實無往來者肇師云證無為果不見往來相三三果又二初問須菩提於意云何阿那含能作是念我得阿那含果不二答須菩提言不也世尊何以故阿那含名為不來而實無來是名阿那含已斷欲思九品則種現俱盡更不來生欲界故翻不來據理合云而實無不來經中既無不字則不須加之四四果又二初問須菩提於意云何阿羅漢能作是念我得阿羅漢道不羅漢無翻名含三義謂殺賊不生應供且羅漢有二種慧解脫俱解脫若慧人修九想八念十想如法界次第名壞法人心猒六欲猶怨賊故修九想以對治作此觀時雖破六欲而多怖畏若修八種正念怖畏即除既含欲心薄又無怖畏爾時欲斷三界結使即修十想第十燒想成就滅壞骨人遂緣空直入即便殺諸結使成阿羅漢是人既滅壞欲身不得三明八解脫滅盡定若俱解脫人不滅壞欲身兼修觀煉熏修四種事禪發真無漏成大力羅漢具足三明八解脫得滅盡定如云慧解脫人緣空直入俱解脫人帶事兼修此之謂也今文正當俱人如禪波羅蜜云摩訶衍云不壞法羅漢能具無諍三昧然如以不明無疑解脫唯明慧俱者何耶須知俱舍婆沙但有慧俱二種者由所修禪定唯此二故而大論明結集時方有無疑解脫蓋從俱解脫開出無別所修禪定荊溪謂阿含有三明解脫即無疑羅漢也若分別異者則約所修三種念處有單復具異二答為五一法實無名須菩提言不也世尊何以故實無有法名阿羅漢自初果至羅漢果無別有法理皆同此無為之體無可取捨故云實無等二念則為著世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者此顯示無念故若有念則為生著何也無為法中既無可得豈復作念耶前之三果準亦如然文在後示三述佛證信自稱不作是念誰可信耶是以述佛稱歎以為證信世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢所以空生述佛稱歎者天親云為明勝功德故為生深信故勝功德者即無諍三昧也大論云須菩提於弟子中得無諍三昧第一無諍三昧常觀衆生不令心惱若謂有所得作念者則為有諍也為生深信者以空生不當自説己證若述佛稱歎為令聞者生深信故四省己絶念世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者世尊我不作是念者有本無世尊字請加入佛雖稱歎而我不作是念世尊我若作是念世尊則不説我是無諍行者阿蘭那此翻無諍故隋譯云我若作是念我得阿羅漢道世尊則不記我無諍行第一此中復舉前佛語者令知己絶念故五名實不虗以須菩提實無所行而名須菩提是樂阿蘭那行論云以無有法得阿羅漢及無所行故説無諍無諍行此中即為安立第一義謝公云得名不虗必稱實也六不離佛出時論云依離障礙十二種中為離少聞故見佛必聞法是謂多聞也疏謂自此以下廣明菩薩行行之相大品云過阿羅漢辟支佛入菩薩位入菩薩位已淨佛國土淨佛國土已成就衆生成就衆生已得一切種智今經過羅漢後入菩薩位次願淨佛土成就衆生正同大品所説之相但一切種智得之實難自非遠離散亂觀破名色等則何以臻此哉文為二初問佛告須菩提於意云何如來昔在然燈佛所於法有所得不上答四果不見所得此舉昔事以詰空生如來此時有所得不梵語提洹竭此云定光亦名然燈如瑞應經謂釋迦如來昔為儒童菩薩以五百銀錢得瞿夷五莖青蓮花并瞿夷二莖共上然燈所散五花止空中當佛上如根生無墮地者後散二花又挾住佛兩肩上佛知至意讚菩薩已因記之曰汝自是後九十一劫劫號為賢汝當作佛名釋迦文菩薩已得決言疑解望止霍然無想寂然入定便逮清淨不起法忍問瑞應行因為何教菩薩答疏云玄文正示摩納值然燈佛是通教行因之相釋籤所指具如瑞應須知乃通衍門三教今文且約通教言之非但通二亦通三藏隨教所説淺深不同一往瑞應多判屬通以得忍斷惑異前三藏不説行因不思議相異後別圓況復若判屬通必兼後二令經兩説豈可徒然今謂瑞應若判屬通教則不然也以通無別部若謂是通瑞應應是大乘衍經此妨大矣今説瑞應乃屬三藏所以經中明菩薩從兜率降下納瞿夷為婦生子逾城六年苦行成道降魔受提謂文鱗供度陳如等五人若爾豈大乘教中所説耶如輔行引大經云若見菩薩從兜率降下納妃生子逾城出家乃至入滅是名二乘曲見以是故知瑞應是三藏明矣問瑞應若是三藏經説得忍菩薩應斷惑耶答實不斷惑經言忍者蓋是逮得故云便逮清淨法忍逮者及也乃及得之故云便逮今引一文類顯如妙經云我今脫苦縛逮得涅槃者疏釋云逮得涅槃者即擬六度菩薩乘何以知之修六度行即免四趣縛未能入滅度三祇百劫乃得涅槃逮之言遠乃及耳荊溪謂逮得涅槃指六度者以望二乘此生即得故云逮得逮者及也若爾逮得涅槃與便逮法忍左右之異今判屬三藏斷無疑矣問瑞應若是三藏妙玄何謂是通答就經判教定屬三藏約義引用其旨則通然何但引證通教只如今經般若滿門亦引其事若爾瑞應應通四教答雖屬三藏演小為大引用該深非謂部通四教今舉一事見意乃以果例因既三藏佛為境本於色相上四見不同是故因亦四見也問淨名疏云三藏無文説忍義立則有是以瑞應若是三藏則有文説忍耶答三藏無文蓋無四忍之文此與淨名不同又復瑞應既云逮得則非約斷位名忍還同義立二答不也世尊如來在然燈佛所於法實無所得以無相心住般若中離分別故不見凡法云何捨不見聖法云何取凡聖一如有何所得故云於法實無所得七願淨佛土論云依離障礙十二種中為離小攀緣作念修道上雖已多聞尚小攀緣作念故文為三初問須菩提於意云何菩薩莊嚴佛土不如來在然燈佛所於法既實無所得云何菩薩而取莊嚴佛土事為欲斷疑故此示問二答不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴天親謂莊嚴有二種一者形相二者第一義相形相者若分別佛國土是有為形相即墮攀緣第一義相雖取莊嚴佛國而不分別形相如是莊嚴非嚴而嚴論所謂離小攀緣疏家不曉論本約修亡相而作土體解釋謂形相指下三土第一義相即常寂光土者繆矣三述示又二初述成是故須菩提諸菩薩摩訶薩應如是生清淨心應如是者指前也若取形相作念攀緣則心不清淨清淨心者離小攀緣心也二勸誡不應住色生心不應住聲香味觸法生心應無所住而生其心論云若念嚴淨土者則於色等事分別味著為離此故經云不應也若住色等生心不免攀緣誡已復勸故云應生無所住心即第一義心也八成熟衆生論云依離障礙十二種中為離捨衆生故然上雖離取相攀緣以淨佛土猶恐捨衆生為顯示不捨衆生而成熟之於此為二初問須菩提譬如有人身如須彌山王於意云何是身為大不論云此顯示為成熟欲界衆生故彼羅睺阿修羅王等一切大身量如須彌尚不應見其自體何況餘者此是舉譬以修羅之身如須彌山終不自見如是大身此顯菩薩雖成熟衆生終不自見謂我能成熟衆生何況餘行豈應自取以菩薩化道多生欲界故云為成熟欲界衆生經意隱略無合法文二答須菩提言甚大世尊何以故佛説非身是名大身度物之心曠周法界故云甚大佛説非身者論云顯示法無我故無可度者即第一義也世諦有所化衆生故云是名也九遠離隨順外論散亂論云依離障礙十二種中為離樂外散亂故菩薩為化衆生習學外論衆生既已成熟復須遠離言外論者彼土則四韋陀典此方則莊老等書雖言詞巧妙而無詮證乃屬散亂論云為離樂外散亂故説四種因緣顯示此法勝異一攝取福德二天等供養三難作四起如來等念勝異者般若勝法異外論故凖論分四初攝取福德又二初示恆河沙喻二以福德較量初又二初問須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不有人讀此云如恆河沙為句數如是沙等恆河以數字作句頭上聲呼者非也此須依無著論讀文論牒文謂如恆河沙數等數字句末去聲呼之恆河者或云恆伽河或云殑伽河孤山云恆伽河此云天堂來彼土外書説此河從摩醯首羅耳中流出故又此河從雪山頂無熱惱池出見其從高處來故云從天堂來其河沙細如大論云此河是佛生處遊行處弟子眼見故多舉為喻問恆河沙為幾許答一切算數所不能知唯佛與法身菩薩能知其數二答須菩提言甚多世尊但諸恆河尚多無數何況其沙二以福德較量又二初舉施寶福多二顯持經福勝初又二初問須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不然此較量愈顯福重經舉無為事假設況喻也天親云前文已説三千譬喻如明福多今重説無量三千世界故不先説此喻為漸化衆生令生信心須知此二番較量以福驗智行位淺深次第為漸化耳然第十八住處復有較量施寶者何當知第十八文有二番非行位淺深乃泛舉較量一者明如來心具足設施法利雖説是經獲利過七寶布施如來之心實不作是念為顯此故較量二者勸獎滅後弘持是經者心無染著其福過七寶布施顯流通福勝此復較量前後大相各有其意二答須菩提言甚多世尊二顯持經福勝佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德受持四句得福過河沙七寶布施者顯般若尊極故也二人天供養為二初舉分説復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟然如何略説四句能感天人供養當知四句雖少所詮理等即是如來法身然如何略説四句者具云塔婆此翻方墳亦名圓冢廟者梵云支提此云靈廟雜心論云無舍利曰支提二況具持何況有人盡能受持讀誦持説四句尚獲是福況能具持其功可知矣受持讀誦者論云受者習誦故持者不忘故若讀若誦此説受持因故為欲受故讀為欲持故誦釋曰受其能詮文持於所詮義讀誦者釋成受持也天親云受持修行依總持法讀誦修行依聞慧廣釋曰受持二字總説所詮義則總覽任持其義屬思讀誦二字總説能詮文則經卷中聞由聞故思義思義即修三慧具矣若大論謂信力故受念力故持對文曰讀背文曰誦釋曰此單就能詮文由受持故有讀誦則三論所説乃能所單復不同各取義釋三難作須菩提當知是人成就最上第一希有之法大論云般若甚深無相可取可信可受若能信受是為希有如人空中種植是為甚難四起如來等念分二初三寶體同若是經典所在之處則為有佛若尊重弟子若是經典即法寶也則為有佛即佛寶也若尊重弟子即僧寶也諸文三寶以理具為同體以佛世為別相滅後為住持今束而言之不出事理則佛世滅後通云相從相因而有故云相從因太子成道故今有刻檀之像因四辨所宣故今有黃卷之法因五人證果故今有剃染之僧因佛世三有滅後三故云相從三寶此屬事也今文則同體三寶於般若法寶中具足佛僧理也二空生問名又二初問爾時須菩提白佛言世尊當何名此經我等云何奉持既聞勝法為欲奉持須知名字故發問也二答又二初立名佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持二受持又二初離執所以者何須菩提佛説般若波羅蜜即非般若波羅蜜論云於中説者為他直説故授者教授他故顯示此樂外論散亂對治此法勝異已於如是法中或起如言執義為對治彼未來罪故經言佛説般若波羅蜜即非般若波羅蜜為對治未來奉持者謂此經勝異如言起執為亡言説相故經云即非不須加是名句也如隋譯亦無此句審問又二初問須菩提於意云何如來有所説法不論云故如般若波羅蜜非波羅蜜如是亦無有餘法如來説者然何故此有所説耶為顯此義故經言於意云何如來有所説法不二答須菩提白佛言世尊如來無所説了知如來依第一義諦説法顯示自相及平等相故説無所説也十色及衆生身搏取中觀破相應行論云依離障礙十二種中為離於影像相自在中無功方便故雖不散動尚執名色故論謂世界微塵彼不限量攀緣作意菩薩恆於世界攀緣作意修習故設巧便以名色同彼塵界觀破疏以此作依正二法明之者不然也須知此唯五蘊正報以一切世間中不過名與色為破名色和合自在之執故設巧便以微塵世界言之且色即色蘊論謂色身以四大同彼外色故經云微塵也衆生即四蘊論謂衆生身亦如三種世間義通依正此即正報世界也於此為二初破色身影像二破衆生身影像色及衆生皆云影像者正是大乘體法觀相如形外之影鏡中之像俱不實也且初破色身為二初細末方便又二初問須菩提於意云何三千大千世界所有微塵是為多不世界由聚塵成立今還細末為塵顯世界空無有體色身何立則唯見微塵假設為問是為多不二答須菩提言甚多世尊二不念方便須菩提諸微塵如來説非微塵是名微塵世界雖末作微塵不復可念微塵為實以慧眼觀之實性本無有何可得是故如來説非微塵是名微塵則第一義故無可念者謂不念方便以世諦則有是微塵謂細末方便疏易謂初破界為塵二破塵空界如是則二諦義昧依論則善二破衆生身影像如來説世界非世界是名世界楞嚴謂云何名為衆生世界世為遷流界為方位論云但以名身意衆生世唯不念方便不復説細末方便是則心但有名而無體質故不説細末以實性無故名身亦非故云非世界也十一明供養如來論云依離障礙十二種中為離不具福資糧故上雖觀破名色而福德未具欲具福資糧須供養如來於此為二初問須菩提於意云何可以三十二相見如來不大論謂三十二相莊嚴丈六之身二答不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相疏云三十二相即父母生身也即是非相乃真如法身也所以唯示生身不云法性身者蓋菩薩行般若時多生欲界是故親近如來且言生身若法性身者大論云法性身佛為法身菩薩説法荊溪謂此約界外得作此説今謂不然若謂般若教主唯生身者同古師之非妙玄引古云般若明空蕩相未明佛性常住猶是無常八十年佛智者以大論生法二身難謂生身同人法法性身佛為法身菩薩説法聽法之象尚非生死何況佛耶荊溪謂只約一身分生法難若爾豈得唯局生身耶所以此中召問空生可以三十二相見如來不由是答云不也世尊不可以三十二相得見如來且三十二相乃分段生滅之身焉以此身見般若教主論云親近供養如來時不應以相成就見如來云何應見見第一義法身故相成就即三十二相第一義法身即是非相良由般若通被三教佛須生法二身若別圓人依中觀用業識見佛住實理故覩三十二相即是法身非相由即法故稱性而見示現無窮不須現起即劣見勝故云是名三十二相若通人依空觀事識但見分齊之身不見法身非相今經從勝而説正見法性勝應之相也問大論明法性身佛為法身菩薩説法荊溪或云此約界外得作此説或云只約一身而分生法二文似異若為甄別答二文本一不應異求何也若約相論則尊特之相乃界外之色分段土本無是相若界外機興是亦應之故謂此約界外得作此説也若約體説只是一佛為機故現勝現劣所謂只約一身而分生法如大論云佛欲説般若波羅蜜坐師子座現最勝身光明色像威德巍巍以此神力感動衆生其有信者皆至阿耨菩提其中疑者佛示常身便得信解而各謂言今所見者是佛真身乃至佛初生時初成道初轉輪時皆以此身如是思惟是佛真身以此而知乃從丈六常所見身於般若初會現起尊崇應界外法性之衆其有不宜見者復隱尊崇還現生身以此生身備歷般若諸會若爾只是一身現勝現劣以此準知二文同轍無異求也問示現現起同異如何答尊特是一但相好有異相異故有須現不須現有分齊無分齊之異也同故同是華臺之相故法華疏明單現尊特記中指同目連不窮其聲止觀明目連不窮其聲輔行謂坐華臺受職之身亦此相也故知荊溪二處特此互指者為彰尊特是一示現即華臺之相故也
