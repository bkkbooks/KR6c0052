body:
  text: 錢唐釋曇應述十二遠離利養起精進故論云依離障礙十二種中為離懈怠利養等樂味故上雖觀破名色具福資糧故供養如來仍恐以嗜利養心身懈怠更須遠離起精進心持説此經如薩陀波論欲聞般若故七日七夜間林悲泣七載行立不坐不臥常念何時當聞般若更無餘念是則若起精進懈怠則摧於此為二初較量福利二重法歎人初又二初舉事福之相須菩提若有善男子善女人以恆河沙等身命布施此捨身命較量則俞重於前大千七寶布施論云以恆河沙等身命布施於中身有疲乏心有熱惱以此二種於彼精進若退若不發此何所顯示如此捨爾許身自所有福不及此福云何以一身著懈怠等疏云已精進者退未精進者不發故云若退等又云自有捨身不捨命如尸毗代鴿自有捨身即捨命如薩埵飼虎此正所謂身命俱捨二顯法利之勝若復有人於此經中乃至受持四句偈等為他人説其福甚多謝公云身命布施不免有生弘持四句纍滅道成二重法歎人又二初重法爾時須菩提聞説是經深解義趣疏云深解之言不出二義一解大乘即空之義二解菩薩利他之義解即空猶謂同入法性解利他亦謂不預斯事此不然也且解大乘即空為密為顯若密方等成通已解豈至般若方解耶若顯應轉小入大則預斯事何云同入法性耶今謂空生來至此會不復同前茫然棄鉢之時心已通泰承佛力加聞此大乘深解義趣若爾二乘在昔亦容知大耶須知雖知有大而不知菩薩別證妙理以不知別理故於大還同不知且據己分謂深解耳問空生若不知別理則內無所證所説無詮答既佛力所加即同佛説涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經涕淚悲泣者以重法之心感形於外流涕雨淚所被之至也我從昔來自鹿苑來所得真空慧眼未曾得聞如是法門勝福甚多過於捨無量身命布施更不説餘勝福豈不發起精進是則空生雖聞大乘而不取雖乘已證而不疑來至法華方知昔咎二歎人為二一正歎二述成初又二初通約信心歎二別約來世歎初又二初聞經信解世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德論云若於此法中生如義想為離此過經言若復有人得聞是經等信心清淨者般若無染故即生實相者法身出纏故當知是人成就第一希有功德等即於如是實相中為離實相分別故二信解無相世尊是實相者即是非相是故如來説名實相是實相者實即無相故則是非相遍相一切故説名實相二約來世歎又二初寄後觀現世尊我今得聞如是經典信解受持不足為難空生省己被命轉教領知財物聞此深經信解受持不為難矣信解受持者以受文故信以持義故解若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相論云為令味著利養懈怠諸菩薩生慚愧故於未來世正法滅時尚有菩薩於此法門受持無我人等取及法取云何汝等於正法興時遠離修行不生慚愧此為勸現寄後説耳論云此人無我相等顯示人無取生空我相即是非相等顯示法無取法空二效學諸佛何以故離一切諸相即名諸佛論云顯示諸菩薩順學相諸佛世尊既離一切相是故我等亦應如是學此等經文為離退精進故説離述成又二初聞經生信論云為離不發起精進者故佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有如是如是者述成也不驚不怖不畏論云以驚等故不發起精進也於聲聞乘中世尊説有法及有空於聽聞此經時聞法無有故驚聞空無有故怖思量時於二不有理中不能相應故畏故知聲聞乘中説有法實有法也及有空偏空也以小乘空有不即今聞般若空有相即聞法即空故驚聞空即假故怖於二不有理中思量時不能相應故畏若有菩薩聞深般若不發精進者即同聲聞生驚怖等是則若心不驚怖必發起大精進如大品云若有菩薩聞深般若不驚不怖當知是菩薩不久得菩提記不過一佛兩佛疏云聞實相不驚聞觀照不怖聞方便不畏二所説勝上論云此法如是勝上汝等不應放逸何以故須菩提如來説第一波羅蜜即非第一波羅蜜是名第一波羅蜜如來説等者論謂顯示彼無量諸佛亦同説般若波羅蜜於餘波羅蜜中勝故名第一經云非者了第一義諦寂絶亡遣故復云是者以世諦則有所説故十三忍辱相論云依離障礙十二種中為離不能忍苦故此為二初能忍二離不能忍初又三初如所能忍須菩提忍辱波羅蜜如來説非忍辱波羅蜜梵語羼提此翻忍辱疏云內心能忍外所辱境大論云忍有二種一者生忍二者法忍生忍有二一於恭敬供養中能忍不憍慢二於嗔罵打害中能忍不嗔恨法忍有二一非心法謂寒熱風雨飢渴老病死等二心法謂嗔恚憂愁乃至諸邪見等今言忍生法二忍中皆第二義論云何者能忍謂達法無我故若達法無我何榮辱之不能忍乎學佛者宜銘心書紳二忍相論謂云何應知忍相若他放己起惡等時由無有我等相故不生嗔想亦不於羼提波羅蜜中生有想於非波羅蜜中生無想何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相梵語歌利此翻惡生亦名極惡如大論云羼提仙人在大林中修忍行慈時歌利王將諸婇女入林遊戲食訖小息諸婇女採華林間見此仙人加敬禮拜久而不去王覺不見婇女拔劒追蹤見在仙人前立憍妬隆盛瞋目奮劒而問仙人汝作何物仙人答云我今在此修忍行慈王言汝云修忍我今試之遂以利劒截耳鼻斬手足而問之言汝心動不答我修慈忍不動也王言誰當信汝是時仙人即作誓言我若實修慈忍血當為乳即時血變為乳王大驚喜而去是時林中鬼神為仙人故電雷霹𮦷時王被害歿不還宮歌利即陳如也論云如我昔為歌利王割截身體我於爾時無有我等相及無相亦非無相等故知此為顯示住實相故不愁惱耳大論問菩薩身非木石云何割截而無異心答有人言菩薩久修羼提故不愁惱有人言菩薩無量世來深修大慈非心故有人言菩薩修般若轉身行般若果報故有人言菩薩非生死身是出三界法性身住無漏故身如木石疏云今詳論文前三義當父母生身後一顯示法性身應知二身不可偏取若唯父母生身未斷結使云何割截無我等相若云法性身不假分段將何以為節節支解血乳之事耶誠由菩薩久修慈忍及行般若已破人法二執得法性身却入分段示行忍辱其所謂以大慈故不住涅槃偏於事境而修種智問有人據大論云佛為菩薩時三毒未盡作仙人名羼提被惡王截耳鼻手足而不生惡心不出惡言爾時得道尚爾何況得菩提等既云未盡三毒驗是父母生身何云法性身耶答此説不然何也須曉斯文乃大論引迦旃延子説三藏義非般若明大菩薩故輔行云釋論引迦旃延子明菩薩義當知大論為破故引若爾如何據論示所破義以伸般若大菩薩耶三種類忍為二初極苦忍何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨肇師云以無瞋恨故無我人相二相續忍須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相割截身體其害極苦如是五百世恆相續無間功德施云此顯往昔未遇惡王已於多生斷我等相既已斷我等相驗仙人時非具縛生身二離不能忍如我昔為歌利王割截身體如是極苦尚能忍之況身外所有豈不能忍乎是故菩薩欲發菩提心應須忍耐一切苦相於此為二初總相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心論云以三種苦故不欲發心故説應離一切相等此中一切相者為顯如是等三苦相也菩薩若不能忍則為三苦所動故云應離等二別相則三種苦相初流轉苦二衆生相違苦三乏受用苦初文不應住色生心不應住聲香味觸法生心論云若著色等則於流轉苦中疲乏故則菩提心不生故大論云菩薩行般若十力無畏不應住若佛於法無有過失則應住若菩薩無佛法何所論住智者釋云菩薩修功德多生重著故言不應應生無所住心若心有住則為非住是故佛説菩薩心不應住色布施無所住心則第一義心若心有住則為非住天親云若心住色等法彼心不住菩提是故佛説菩薩之心常行於捨豈應有住故云不應住色布施此應約三種施釋二衆生相違苦須菩提菩薩為利益一切衆生應如是布施如來説一切諸相即是非相又説一切衆生則非衆生論云為一切衆生而行於捨云何於彼而生瞋也由不能無衆生及衆生想以此因緣故衆生相違時即生疲乏故顯示人無我法無我如來説一切衆生相假名無實故即是非相人無我也又説一切衆生陰法本空故則非衆生法無我也若達人法本空忘人法之執如是則能忍不與衆生相違也須菩提如來是真語者實語者如語者不誑語者不異語者論云欲今信如來故能忍於中真語者為顯世諦相故實語者為顯世諦修行有煩惱及清淨相故於中實者此行煩惱此行清淨故如語者為第一義諦相故不異語者第一義諦修行有煩惱及清淨相故然論中四句以初二兩句對世諦以後兩句對第一義諦並是初句示諦相次句為修行若爾二諦各有修行煩惱清淨之相若為甄別疏云世諦修行即化他出假有塵沙煩惱及道種智清淨之相第一義諦修行即自行觀理有見思無明煩惱及一切智一切種智清淨之相此説不然也今謂二諦中俱有三惑三智世諦則分別義依之而修則惑智敻別故云此行煩惱此行清淨所謂實語也第一義雖惑智乍分法體則惑智不二所謂不異語也此經兼含圓別乃兩機所修不同故約二諦行相説之問此經五句未審不誑語若為所屬答隋譯無此秦本有之如疏云應知四句約法為言不誑對人而説四別一總彼略此詳須菩提如來所得法此法無實無虗論云説此真語等已於中如言説性起執著為遣此故經言須菩提如來所得法無實無虗無實者如言説性非有故言語性空也無虗者不如言説自性有故雖空而有所説也三乏受用苦須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色由乏觀慧便著於事而行捨施希求果報者則為愛欲所覆不解出離猶如入暗不知所趣若不著於事而行布施如人有目夜過日出見種種色隨意所趣論謂彼無明夜過慧日出已如實見之須知無明乃支末無明見思惑耳何也住相布施既感三界譬如夜暗今滅此暗豈非見思十四離寂靜味論云依離障礙十二種中為離闕少智資糧故欲具資糧於此法門受持讀誦等論云此中為離三摩提攀緣顯示與法相應有五種勝功德一如來憶念親近二攝取福德三讚歎法及修行四天等供養五滅罪準此分文為五初如來憶念親近須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人然則此中但云受持讀誦不云為人解説若下四文皆有為人解説須知此既如來憶念親近且在自行若下四文則兼化他故偈云此為自淳熟餘者化衆生悉知是人等者顯示如來憶念親近受持此經之人論云如來以佛智知彼如來以佛眼見彼二攝取福德又二初總攝皆得成就無量無邊功德由受持是經故成就如是福德二較量又二初捨身數多須菩提若善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施然前文但捨一恆河身命此則日施三恆復經多劫此勝於前前則身命俱捨此但捨身而不捨命則前勝於此若爾但泛舉較量不同施寶多少以論漸化也旦日施三恆之身雖事大捨重乃有所得心作用未若無所得心持説此經其福勝彼故知為欲較量福勝舉此假設實無斯事肇師云從旦至辰名初日分從辰至未名中日分從未至戌名後日分二較量福勝若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説何況書寫等者大品法施品云化恆河沙衆生令得六通不如書寫般若令他讀誦又以此令他讀誦之福不如正憶念般若又此憶念般若之福不如為他人演説令易解故次第較量顯為人解説最勝三讚歎法及修行為三初歎法須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者説為發最上乘者説論云不可思議者唯自覺故不可稱量者無有等及勝故且自覺者覺了此經功德不可思議則自歎此經也無有等及勝者稱量此經功德無有等者及勝此經者此對他偏小歎也為發大乘者説者此揀小故知説法非器不授三乘中非為發二乘心者説為發最上乘者説者此揀偏論此成就不可稱義於中餘乘不及故最上煩惱障智障淨故最勝此中揀示由菩薩義通偏小故云餘乘不及唯圓稱最上能淨二障故所謂成就不可稱義也二歎人論云讚歎修行修行即人於此為二初總説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就此為知見成就何等功德二解釋不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提此經功德非心可度量非口可稱説無有邊際可及故云不可思議功德也荷擔者論云肩負菩提重擔故此具以能所用全經意經歎能弘人云荷擔平聲論約所弘法云重擔去聲三簡非何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解説此經既為發大乘者説則樂小法者不能聽受樂小者二乘人也著我人等見者凡夫人也如隋譯云若樂小法者即於此經不能受持讀誦為人解説若我見衆生見人見壽者見於此法門能受持讀誦修行為人解説者無有是處論解云經言若樂小法等者謂聲聞緣覺乘者故經言若有我等見乃至受持無有是處者謂有人我見衆生而自謂菩薩者故所以大品云須以智慧觀知諸法實相故知凡夫生盲二乘眇目外聽不解由無智眼無智眼故聞亦不別故知凡夫二乘並不堪聞般若此總結前凡小不能聽受等也若讀此文須以隋譯照之四天等供養須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處謝公云地是無知法處故貴在人天而不尊乎五滅罪業又二初正滅罪復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提論云受持此經為人輕賤等者此毀辱事有無量門為顯示此故説輕賤經言當得阿耨菩提者顯示滅罪故是即非但滅罪以經力故亦當得菩提先世罪業者業通三世須知此是定業定業不可懺以行般若故但易重為輕耳如大品云菩薩行般若故所有重罪現世受大論解云先世重罪應入地獄以行般若故現世受譬如重囚應死有勢力者護則受鞭杖而已二較勝負於此為三初舉事福須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者論云我念過去等者此顯示威力故即是福聚威力以彼所有福聚遠絶高勝故應知過阿僧祇者更過前故不空過者常不離供養故阿僧祇此云無數劫具云劫波此云分別時節那由他者十億為洛叉十洛叉為俱胝十俱胝為那由他二顯經力若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及供養是有為事福持經是般若了因肇師云此明供養諸佛所得功德不如持經有功德故能速證菩提三勸信心又二初具説防疑須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心即狂亂狐疑不信然上雖較量顯福德之多猶是略説若更具説聞者狐疑心必狂亂論云此顯示多故或以為狂因或得亂心果狐疑者狐是獸一名野干其性多疑故以為喻噫若心信法法即染心猶豫狐疑事同覆器疏云大乘信謗罪福俱重今經且言信之得福諸經備説謗之得罪二結顯法門須菩提當知是經義不可思議果報亦不可思議論云應知此之彼威力及彼多等何人能説是故經言當知是法門不可思議果報亦不可思議此顯示彼福體及果報不可測量故當知是經為句貫下義及果報福體即所詮義也果報即所感報也現生名習果隔生名報果十五於證道時遠離喜動論云依離障礙十二種中為遠離自取故疏云證道者須分兩教之相若圓教即初住已上分證中道也以論云於證道時故若別教且屬回向相似證道也以論云將入證故讓下十七方入初地兩楹進退皆可從容今謂不然若以證道分判別圓者此傷論意論本一意但總別之殊若云於證道時此總名住處即科語也若謂將入證道等此別文解釋也若爾如何以總別之文分派配對別圓兩教耶故無取也於此為二初問爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心論云何故復發起此初時問也將入證道菩薩自見得勝處作是念我如是住如是降伏其心我滅度衆生為對治此故須菩提問當於彼時如所應住如所降伏其心故知空生於經初發起行相問降住事佛為其答行位次第聯翩至此將入證道而恐菩薩起自取著謂我能降住其心以得勝處若生是心違不住道障於菩提為對治此故須菩提問謂當於彼時即當入證道時既已住般若豈應自取為離此取是故問起云何應住等以論謂於證道時遠離喜動又云遠離自取斯之謂歟肇師云須菩提重問云何真住真降伏其心者然肇師意亦為未入證菩薩問入證事謂之真住疏家不曉以從己見作已入證説者豈其然乎二答又三初正答佛告須菩提善男子善女人發阿耨多羅三藐三菩提者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者三藐三菩提下經無心字恐譯者缺文此中空生發起初時問及世尊所答但云當生如是心則如是住般若之心不應起自取亦無所度衆生也二簡非何以故若菩薩有我相人相衆生相壽者相即非菩薩既未入證無明未除實理未顯猶恐菩薩有我人等取為欲審是所以簡非論云若菩薩有衆生等者為顯我報取惑隨眠故即無沒無明隨眠之識三顯是所以者何須菩提實無有法發阿耨多羅三藐三菩提心者論云若言我正行菩薩乘此為我取對治彼故經言須菩提實無有法名為菩薩發菩提心者十六為求教授故論云依離障礙十二種中為離無教授故教詔授道則指然燈佛時也於此為三初問須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不既遠離自取謂實無有法得菩提欲審空生所解復以昔事為問於意云何如來此時行行為有法不得不二答不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提如我解佛以菩提法不可説故於然燈佛所無有法可得也三述成為五初正述佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提印許其説故曰如是大品云須菩提問佛諸法無生相此中得菩提記不佛言不也又問諸法生相此中得菩提記不佛言不也乃至問諸法非生非不生相中得菩提記不佛言不也須菩提云世尊諸菩薩云何知諸法得菩提記佛言汝見有法得菩提記不不也世尊我不見有法亦不見有得者得處佛言如是如是須知此乃佛欲示其般若無相可得欲知其所解而反詰之空生所答既稱佛旨是以印許則與今文意大同二反顯須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我授記汝於來世當得作佛號釋迦牟尼論云若菩提可説如彼然燈如來所説者我於彼時便得菩提然燈如來即不應授記汝於來世當得等也三復宗以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義論云以彼法不可説故我於彼時不得菩提是故與我授記應知又何故不可説以如來者從真如中來真如體遍故如清淨故無可得故若有可得是則非如非如故相異不名諸法如義四防非若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無故此中有三義若有人言下妄取實無有法下離取如來所得下顯是所謂防非者防其妄取也由所空生答如來在然燈佛所無有法得菩提佛既印許恐不了者謂如來彼時不得菩提後時自得菩提故云若有人言等妄取也為離此取是人不實語故云實無有法佛得菩提也三顯是如來所得菩提於是中無實無虗論云無實謂言説故有言則非實第一義中離言説相也論云無虗謂彼菩提不無世間言説故以世諦則有言説相也須知此經法相唯談二諦二諦一體相即正如波水偏取不可故論云顯示真如無二故無二者真俗一體也五結示是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法如來説一切法全體是真如故故云皆是佛法也所言一切法既同一真如真如清淨即非色等一切法又法體不成就故為安立第一義也是故名一切法者世諦即萬法炳然未嘗改轉也須知約不變體故一切法全是真如約隨緣用故全真如為一切法但有二名實無二體何容取捨耶十七入證道以前十二種皆有惑障可離此入證道已盡障礙所謂淨心地也於此又二初得智二離慢初又二初問須菩提譬如人身長大長大非高大長字應上聲呼以經初發心修行行位漸次今已入證如人自幼長大故論云得智有二種智一攝種性智二平等智若得智已得生如來家得決定紹佛種此為攝種性等以此準知須作長上聲呼大讀文由得智故轉染依淨分顯三身如論云得此智已能得妙身於中妙身者謂至得身成就身然隋譯謂妙大今經云長大蓋一也且得智即報智至得即法身成就即應身以證三身得為長大則證得名長體遍名大以修攝性故云攝種性智也平等智復有五種一粗惡平等二法無我平等三斷相應平等四無悕望心相應平等五一切菩薩證道平等即理性體同三諦平等論云得此等故得為大身攝一切衆生大身故須知菩薩得此智故分顯三身得為大身衆生性具三身亦名大身以三身體一全性成修以修攝性故云攝衆生大身也二答須菩提言世尊如來説人身長大即為非大身是名大身如來顯示入證道所得大身攝衆生理具大身為問空生以簡性顯修而答即為非大身者簡性論云於彼身中安立非自非他且彼指衆生身也非自則非報也非他則非應也衆生身中雖具三身尚未曾發心加行唯同正性法身既闕報應所攝大身即為非大身也是名大身者此顯修論云於此大身中安立第一義且此大身者指入證菩薩對彼衆生大身故云於此大身安立第一義故具足三身是名大身也論云如是等是為得智慧二離慢又二初無慢須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩前文謂得智此中謂離慢既已離慢則顯無念論云若作是念我滅度衆生我是菩薩應知此是慢者非實義菩薩二復宗何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者由不自取謂是菩薩亦無所度衆生亡能所故故云實無有法名為菩薩引佛語證是故佛説一切法皆是佛法則無法我人等相故論云若菩薩有衆生念則不得妙大身十八上求佛地應知復有六種具足攝轉依具足一國土淨具足二無上見智淨具足三福自在具足四身具足五語具足六心具足疏云言轉依者謂轉於染而依於淨以在九時一切諸法依阿梨耶識所有國土乃至三業皆悉染礙今至果上既破梨耶則轉諸法依於真如是故國土乃至三業皆悉清淨言具足者以此轉依通前證道今上求佛地究竟具足準此為六然此六種具足不出依正二報國土屬依後五屬正初國土淨具足又二初簡非須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴論云此為於共見正行中轉故為斷彼故安立第一義須知莊嚴佛土是正行也若作是言我能莊嚴佛土者即存能所之共起分別之見故云共見是不名菩薩於正行中轉故為斷彼分別執故安立第一義諦第一義中雖莊嚴佛土而不取莊嚴相何以故常寂光土非嚴而嚴也二顯是須菩提若菩薩通達無我法者如來説名真是菩薩論云通達無我者此言為二種無我謂人無我法無我反顯若有二種我取謂我成就為人我取莊嚴國土為法我取此非菩薩二見智淨具足論云為應知中實證得故安立見為教彼衆生寂靜心故安立智是即一體五眼見一心三智知中實證得五眼菩提即自行也教彼衆生住三智心即化他也文為二初見淨須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼然此經前後無不遣相唯此文中空生具答如來有五眼者何耶須知遣相非無在次文兼説但此中具答之意如何良由般若能生五眼特彰顯此是故具答如大論云六波羅蜜般若波羅蜜為本以是故説般若波羅蜜能生五眼菩薩漸漸學是五眼不久當作佛以此故知今至佛地為顯如來具足五眼論云如來不唯有慧眼為令知見淨勝故顯示有五種眼若異此則唯求慧眼見淨然若蕩相明空應慧眼所見在如來不唯慧眼而具五眼請觀音云五眼具足成菩提以是義故如來具問而空生具答若不具答菩薩行般若時不為成就五眼菩提故云若異此則唯求慧眼見淨也論云於中略説有四種眼謂色攝第一義諦攝世諦攝一切種一切應知攝且色攝復有二種一者謂法界修果此為五眼粗境界故是初色攝故知五眼義該十法界果謂修果也修則屬事此為粗境界故是色攝二者第一義智力故世智不顛倒轉是約二智體一説二第一義諦攝論謂在先三世諦攝則分別義如來所具五眼實不分張祇是一眼備有五用能照五境雖四眼通因同彼所見佛過彼所見故為世諦攝也四一切種一切應知攝者此就法眼論云於中為人説法若彼法為彼人施説此地説名法眼一切應知中一切無功用智説名佛眼此等名為見淨也若分別為言佛眼是體四眼是用若作總別則涅槃是總三德是別五眼亦爾二智淨又二初喻河沙須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊二顯智相智有三種一切智空也道種智假也一切種智中也佛告須菩提爾所國土中所有衆生若干種心如來悉知若干者若如也干數也顏師古云設數之辭也論云若干種心者應知有二種謂染及淨即共欲心離欲心也何以故如來説諸心皆為非心是名為心皆為非心者第一義中都無有心故是名為心者世諦説則有諸心異故然見淨中不説眼即非者如論云以一住處故見智淨後安立第一義初亦得成就所以者何須菩提過去心不可得現在心不可得未來心不可得世諦則有過現未殊第一義觀世體不實皆不可得須知法界非三世所攝三為福自在具足為二初福非有漏二福性自在初又二初問須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不偈云佛智慧根本非顛倒功德以是福德相故重説譬喻天親釋云心住雖顛倒福德非顛倒何以故佛智慧根本故須知福相法身中舉大千七寶布施此中復舉故云重説若爾二文何異當知前文藉般若導達事福即性顯此經功深故舉較量此中直就無漏福體不舉較量所以重舉者顯福相同也二答如是世尊此人以是因緣得福甚多無漏福德因緣也二福性自在須菩提若福德有實如來不説得福德多以福德無故如來説得福德多疏云無則稱性是名為多多即自在解脫之德也四身具足然雖達福智具足未審於身相所見如何更審其見於中為二初為好具足二為相具足好即八十種好相即三十二相初又二初問須菩提於意云何佛可以具足色身見不二答不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身二相具足又二初問須菩提於意云何如來可以具足諸相見不二答不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足如來以相好為問空生並答不也者由了知色相非如來體故云不應等也即非具足者以第一義法身即非色相故也是名具足者以世諦即法身不離色相故也偈云法身畢竟體非彼相好身不離於法身彼二非不佛疏云上二句釋二不應下二句釋二是名五語具足然見相必須説法故更示之於此為三初正示須菩提汝勿謂如來作是念我當有所説法莫作是念以身例説身既非身有何所説是故遮云莫作是念等偈云如佛法亦爾二反顯何以故若人言如來有所説法即為謗佛不能解我所説故疏云即為謗佛者謗有四種謂增減相違戲論也若言有所説即為增謗三復宗須菩提説法者無法可説是名説法隋譯謂説法説法者天親云何故重言説法説法者偈云所説二差別故何者是二一者所説法二者所有義所説法能詮教也所有義教下所詮理智等八法也什師略不重云説法者但舉能詮必具所詮也無法可説是名説法者偈云不離於法界所説既會法界則無説而説若離法界而有所説者則墮自相偈云説法無自相六心具足以如來心等彼衆生心謂心具足上雖以示身口二輪皆不可得未審如來之心所住如何是以假緣興問三論次第宛然且下有六十二字隋譯文有秦本則無此譯人存略故圭峯纂要孤山淨覺並不入斯文以例大論十分略九非無其理然天竺三論皆釋此文既是正譯或添入者義亦無害是以無著釋此心具足中有六意則生起連環似不可缺近代諸師亦尚解釋況復䨥王特令迦之如通慧僧傳云唐上都釋靈幽素持金剛般若偶疾暴終杳歸冥府引之見王俾令諷誦誦畢王曰勘少一節何貫花之線斷乎師壽雖盡且於還人間十年要勸一切人受持斯典如其真本在豪州鍾離寺石上幽終七日而穌遂奏奉敕令寫此經添其句逗故令秦本多所加入者良由此也就文為六一為念處二為正覺三為施設大利法四為攝取法身五為不住生死涅槃六為行住淨初又二初問爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不為欲顯示世尊念處故設問謂頗有衆生等慧命者如荊溪云善吉解空空慧為命故云慧命又諸慧人中佛慧第一佛於般若命其轉教其為慧人所命故云慧命二答佛告須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生先就衆生體通約二諦説論云彼非衆生者第一義故非不衆生者世諦故何以故下別示如來念處論云於諸衆生中顯示如世尊念處故然則衆生既不出二諦即同世尊念處有誰聞法生信心耶衆生衆生者初標起云衆生次牒釋云衆生者以如來念處第一義中無非聖體有何衆生若有衆生者乃成增益此遮增益邊故如來説非衆生此顯示不共義也以世諦則有可説事由如來説非衆生名衆生若無彼衆生乃成損減此遮損減邊故云是名衆生此顯示相應義也須知以離二邊之失真俗相即一體圓詮二為正覺為二初問須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶且如來念處既無有衆生亦應於菩提無所得耶此問因上而生若爾什公何以略去須知略之所以者由正覺中既顯示菩提自相無有少法可得及生佛體同平等無有高下則如來念處無可念者所以略之二答論云為離有見過已顯示菩提及菩提道故彼復顯示菩提有二種因緣謂阿耨多羅語故三藐三佛陀語故且初多羅語如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提論云顯示菩提自相故菩提解脫相故彼中無微塵許法有體是故亦不可得亦無所有且菩提自相者性體本有也菩提解脫相者性雖本有道在修成得菩提離生死縛則解脫相也彼中等者指彼所修則全性成修性外未有微塵許法別有體可得是名阿耨菩提也二為佛陀語復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提更舉能證人故云復次論云顯示菩提者人平等相於中平等者以菩提法故得知是佛菩提此云覺則覺性無差生佛平等相也於平等中別顯修得故曰菩提法得知是佛也無有高下者論云顯示一切諸佛第一義中壽命等無高下故欲攝微弱之類故舉壽命義通十界則第一義中十界體同等無高下大品云是法平等一切聖人皆能行不能到須菩提言佛者一切諸法中行力自在云何不能行不能到佛言若諸法不平等與諸佛有異應當如是問今諸凡夫諸聖人法皆平等是平等故皆不可得且不能行不能到者修因名行證果名到問多羅語與佛陀語何異答人法有異但以詮辨稱語也二顯示菩提道以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來説非善法是名善法以無我人等者論云顯示菩提生死法平等相故以菩提生死雖有高下而無二體以一體無差曰平等相其如明暗明時暗不向東西南北去全暗體是明則明暗䨥遊其體無二如是則非離生死法別求菩提祇觀一切法即菩提相故云修一切善法即得菩提正所謂障體即德不待轉除者也所言善法者如來説生死非善之法是名菩提善法亦如淨名云行於非道通達佛道也良由住般若故觸目盡是菩提豈見有生死法異論謂此安立第一義相故以第一義相相相皆實無可棄者三施設大利法論云於中為安立第一義教授故弘持斯典雖獲大利如來之心實無有念為顯此故先舉施寶較量法利於此為二初較量法利二實智除情初又二初舉施福須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施二顯法利若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一千萬億分乃至算數譬喻所不能及偈云是故一法寶勝無量珍寶此法乃菩提因故勝七寶布施疏云問經明受持四句乃至為他人説顯是因中自利利他之相何故論文作果上施設大利耶答因人得利乃由持説果人之法經從所利論約能施二實智除情為四初法界無染須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者如來雖施設廣利衆生而不作念故遮云汝勿謂等莫作是念者再誡所以再誡者此中顯示如來之心住實智故無可度也偈云平等真法界佛不度衆生以名共彼陰不離於法界天親釋云衆生假名與五陰共故彼共陰不離法界法界平等實無有一衆生可度二感教由緣若有衆生如來度者如來即有我人衆生壽者若有可度者即為有我人等取而衆生獲其利者由自性之所感也三隨情稱我須菩提如來説有我者即非有我而凡夫之人以為有我如來既無我人等取云何有時稱我而如來説有我者假名稱我不實取我故云即非有我何緣假名稱我蓋凡夫妄取以為有我是故如來隨情説我四隨智俱實須菩提凡夫者如來説即非凡夫以如來住實智故則凡聖一如而於凡夫亦不見是凡夫準知不應擅加是名凡夫句四攝取法身以就法身妙體攝彼無差文為二初顯法身二遮偏取初又二初試問善現二正示法身初為四初以應相問須菩提於意云何可以三十二相觀如來不欲顯自性法身而以外應相試問問第十一供養中亦問可以三十二相見如來與此何異答不同以上文云見今文云觀覩相見如來為供養故內心觀如來顯心具足故二以相事答須菩提言如是如是以三十二相觀如來此經有六譯他譯皆答云不應以相成就見如來唯此譯有異者疏云或梵本不同或什師善得經旨即以相體而為答辭由是生起下文佛之難意今謂不然若爾全成譯者語非空生所答須知什公全準梵文不同諸譯若然空生前文數答所問莫不皆云應相即法何以此方不了順問答取當知前並問見故不執外相應身約應即法身體答此中既問可以三十二相觀如來空生以謂佛問所觀且所觀之境莫不是緣生之事由是順問以應相事答三以唯體難佛言須菩提若以三十二相觀如來者轉輪聖王即是如來偈云非是色身相可比知如來諸佛唯法身轉輪王非佛大論明輪王亦三十二相佛亦三十二相但佛有七事勝於輪王一明好二分明了了三不失處四具足五深入六隨智慧行七隨處離著四以唯體解須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來為佛反詰方解所説外相世諦豈能得見如來內體法身二正示法身爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來此如來稱我乃四德真常淨我非假名稱我若以外色聲求則墮分別豈見內體法身論云諸見世諦故是人行邪靜應知彼不見故知由不能觀內體法身同世禪邪靜是以藏通唯知灰斷不見常住法身別教雖知常理但相由理變不能達相即理皆名世諦邪見故迦葉童子云未聞三德涅槃以前皆名邪見唯圓見法身四德體具方曰正見隋譯此後復有一偈彼如來妙體即法身諸佛法體不可見彼識不能知此偈正明法身諸疏不説承此伸釋無謂繁剩且法身有二謂性德修得彼如來妙體者彼指衆生本具性德法身妙體也即法身諸佛者即是諸佛修得所顯法身也性具在迷修得屬悟迷悟雖殊妙體不二故文云即也然法身妙色清淨湛然唯佛眼方見種智能知簡非四眼所見故云法體不可見非二智所知故云彼識不能知學大乘者能知法身妙色雖是肉眼名為佛眼人何自欺不見妙色謂同彼太虗空無一物名法身者斯人未生圓解而起偏執也秦譯缺此一偈者疏云是則羅什但存斥邪流支具翻顯正披沙若盡金體自彰童壽之意諒在茲乎二遮偏取須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提此中文有二意初防其作念次遮其起心且防作念者由前既斥不可以色聲相能見如來是以防其作念謂棄色相而求菩提故經云汝若作是念如來不以具足相故得菩提是則若離色相有菩提者乃同彼偏見由是遮其起心故云莫作是念謂如來不以具足相故得菩提莫者遮止之辭也五不住生死涅槃為二初為不住涅槃二為不住生死初又二初防非須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念由上為防作念謂如來以無相得菩提雖已遮之尚恐偏執涅槃空義發心若作是念則毀相修説諸法斷滅故復遮云莫作是念也二顯正何以故發阿耨多羅三藐三菩提者於法不説斷滅相論云經言於法不説斷滅相者謂如所住法而通達不斷一切生死影像法於涅槃自在行利益衆生事此中為遮一向寂靜故顯示不住涅槃須知菩薩通達生死法如影像之不實是故不斷於中自在行利益衆生事顯示不住涅槃者是則若斷生死安住涅槃則説諸法斷滅故云為遮一向寂靜寂靜者偏空涅槃也二不住生死論云若不住涅槃應受生死苦惱為離此故顯示不住流轉於中為二初較量得忍須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德論謂七寶布施是有為之福尚於生死法中不受苦惱何況菩薩於有為法得自在故無彼生死法我得成於忍己所生福德勝多於彼疏云經云菩薩者且語上求之人論云如來者唯從佛地而説左右之稱二顯示不住又二初點示須菩提以諸菩薩不住福德故論云此顯示不住生死故若住生死即受福德二重審須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德菩薩所作福德者論謂世尊於餘處説應受福德故則顯示方便應受不應貪取是故説不受福德受者説有故亦行住淨以如來於四儀行住動靜中無所取著故淨為二初破執二破見於實境起執於假名起見破執為二初威儀行住二名色觀破自在行住初又二初防非須菩提若有人言如來若來若去若坐若臥是人不解我所説義論云應知為威儀行住故於中行者謂去來住者謂餘威儀是人不解所説應用謂之實有也二顯正何以故如來者無所從來亦無所去故名如來偈云去來化身佛如來常不動於是法界處非一亦非異故知化身隨緣去來法身常住不動以化即法故非一亦非異即來無所來去無所去也二破名色身自在行住為顯如來應身名色不實故以破妄執於此為三初觀破色身二觀破名身三並説摶取初又二初細末方便須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不甚多世尊疏云碎為微塵者假設之辭欲明世界本空須了微塵不實欲明微塵不實故先碎世界為塵二無所見方便何以故若是微塵衆實有者佛即不説是微塵衆所以者何佛説微塵衆即非微塵衆是名微塵衆論云是為無所見方便此説有何義若微塵衆第一義是有者世尊即不説非聚經言佛説微塵衆即非微塵衆是故佛説微塵衆以此聚體不成故若異此者雖不説亦自知是聚何義須説二觀破名身世尊如來所説三千大千世界即非世界是名世界論云三千大千世界等者此是無所見方便此破名身心但有名而無形質不説細末方便此亦如前説第一義即非世界是名世界三並説摶取乃並説名色和合義由上但真觀名色不開摶取故何以故若世界實有者即是一合相如來説一合相即非一合相是名一合相須菩提一合相者即是不可説但凡夫之人貪著其事論云若世界實有即是一合相者於中為並説若世界若微塵界故有二種摶取謂一摶取及差別摶取衆生類衆生世界有者此謂一摶取微塵有者此謂差別摶取以取微塵衆集故且衆生類者四蘊種類為衆生界四蘊之心混然一體名一摶取也色蘊同彼外塵名差別摶取也如來説一合相即非一合相等者論云此上座須菩提安立第一義故世尊為成就如是義故謂即非一合相也論云一合相者即是不可説等此何所顯示世諦言説故有彼摶取第一義故彼法不可説不可説故則非也有彼摶取故是名也須知二諦一體相即偏執成非但凡夫之人貪著其事者揀非由凡夫妄立主宰謂為實事顛倒因緣往來三界論云彼小兒凡夫如言説取非第一義故此屬虗妄也二破見論云已説無所見方便破義未説無所見中入相應三昧時不分別謂如所不分別及何人何法何方便云何不分別此後具説於此為二初破計二顯正初又二初問須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不論云顯示如所不分別云何得顯示如外道説我如來説為我見為破妄執令知無我此安置人無我也然此以外人為端而召問空生二答世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見是人不解執實有故世尊説我見者論云又為説有此我見故安置法無我若有彼我見是見所攝故經云即非我見也斯亦二諦之義第一義中即非我見世諦是名我見由二諦相即説非我名我也如是方解佛所説義論云如是觀察菩薩入相應三昧時不復分別即此觀察為入方便以安置二空故不復分別二顯正須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相論云經言菩薩發菩提心者此顯示無分別人已破無明得中道如實智故無所分別論云經言於一切法者此顯示於何法不分別經言應如是知如是見如是信解者此顯示增上心增上智故於無分別中知見勝解於中若智依止奢摩他故知依止毗鉢舍那故見此二依止三摩提故勝解以三摩提自在故解內攀緣影像彼名勝解且增上心即菩提心增上智即圓妙智奢摩他此云止毗鉢舍那此云觀三摩提此云等持以此止觀等持故明靜不二則自在解內虗通如影像不實則勝解論云不生法相此正顯示無分別大論云諸佛及大菩薩智慧無量無邊常處禪定於世間涅槃無所分別須菩提所言法相者如來説即非法相是名法相如來説即非法相者第一義諦指事即理無所分別此顯示不共義也是名法相者世諦指理即事諸法宛然此顯示相應義也論云應知欲願及攝散二種如前所説更無別義是故不復説其方便由文缺何方便一義故點示第三流通分流名下注通名不壅使正法之水從今以注當聖教之筌蹄不壅於來世然此經雖節節勸獎持説功深未曾別示流通之旨是故經畢方別勸持流通所以論云不染行住即流通義於此為二初流通無染二四衆奉行初又云初説法無染須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼論云以有如是大利益故決定應演説如是演説而無所染二流轉無染指生死為流轉也云何為人演説不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀云何為人演説者牒前也論云此有何義顯示不可説故不取於相彼法有可説體應如是演説若異此者則為染説以顛倒義故又如是説時不求信敬及以利養等亦無染説若心有染則生死流轉也如如不動者上一如字是心下一如字是境心如如境境如如心心境一如安住實理何物能動故曰如如不動何以故者何以不動蓋達一切有為法不實如夢幻等故然此經唯六喻隋譯則有九喻如云一切有為法如星翳燈幻露泡夢電雲應作如是觀疏云什師無星翳燈雲四喻加影成六以影則可攝彼四喻乃取光影之影若形影之影唯局在身也仍以六喻表對六法謂神我及五陰也今謂不然若光影攝彼星等具電亦應攝取耶又以六法表對但見正報未盡一切有為之言又出二圖子將六喻會同九唯若爾既可會同何不依論解蓋徒然爾今來須知譯人取喻但欲見虗假不實之義何必名數齊等是則數雖不等其義宛同今依論四種有為帖釋此經六喻四種有為者一自性相二所住味相三隨順過失相四隨順出離相且自性相者論以星翳燈三以喻自性中相見識三今但以夢具相見識三義何者夢乃眠法覆心虗妄所見此相義論云此相如星應如是見何以故無智暗中有彼光故有智明中無彼光故夢亦復爾無智暗中有此夢故夢中謂實此見義論云人法我見如翳何以故以取無義故夢中所執亦無義也由謂實故取著貪愛此識義論云識如燈何以故渴愛潤取緣熾然於中著夢中受取貪著亦然覺來方知是夢也此相見識悉由自性根識而生皆如夢也二所住味相論云味著顛倒境界故彼如幻何以故顛倒見故良由不了前塵如幻虗假味著境界顛倒見故三隨順過失相論以露泡為喻今更加影且泡者論云隨順苦體以受如泡故且有身則苦生身為苦體也以受如泡者受有三受謂苦受樂受授受三受浮偽如泡是知以三受而生三苦即苦受生苦苦苦受是違情逼迫受必有漏苦身苦上加苦故云苦苦樂受生壞苦樂受是順情適悅樂謝悲生故云壞苦捨受生行苦捨違順苦樂平常心是而生行苦行即四相遷流不安穩故凡夫不知是苦聖人觀之無非是苦如俱舍云如以一睫毛置掌人不覺若安眼睛上為損極不安凡夫如手掌不覺行苦睫智者如眼睛緣極生厭怖故知行是苦此顯示苦義也影者由形則影生影無自體此顯示無我義也露者論云顯示相體無有以隨順無常故如云五欲無常如華上露見暘則晞以是即知相體無有定實所謂無常也四隨順出離相者論以夢電雲喻過現未今但取電喻現在論云現在不久住故如電也則過未準知如是解釋義與文會何必異求應作如是觀者結勸也當作如是觀知有為世相虗偽豈為生死流動耶二四衆奉行佛説是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅等聞佛所説皆大歡喜信受奉行隋譯四衆文後云菩薩摩訶薩阿修羅後復云乾闥婆等以彼驗此合有八部什師從略但云阿修羅等則等八部也皆大歡喜者即三教得益不同今但總略而云歡喜信受奉行者無疑曰信領納曰受由信受故奉行也
